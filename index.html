<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Mother's Day Webapp</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page d-flex justify-content-center align-items-center">
      <section class="card mothers-day-card text-center shadow-lg">
        <div class="card-body p-5">
          <p class="small text-uppercase fw-bold mb-2">
            A special card for you :)
          </p>

          <h1 id="topText">Dear Tanya</h1>

          <p id="message" class="message">Click the button to grow the love.</p>

          <div id="flowers" class="flowers mb-4"></div>

          <button id="bloomBtn" class="btn bloom-btn">Make it Bloom</button>

          <p id="finalMessage" class="final-message mt-4 d-none">
            Thank you for your love, patience, kindness, and everything you do.
          </p>
        </div>
      </section>
    </main>

    <!-- Your JavaScript -->
    <script src="app.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
